<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XMRig WASM Test</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #e0e0e0; 
            font-family: monospace;
            padding: 20px;
        }
        button {
            background: #ff7f50;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled { background: #555; }
        .stat {
            margin: 10px 0;
            padding: 10px;
            background: #1a1a20;
            border-radius: 4px;
        }
        #log {
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🔥 XMRig WebAssembly Test</h1>
    
    <button id="startBtn">Start Mining</button>
    <button id="stopBtn" disabled>Stop</button>
    
    <div class="stat">
        <div>Hashrate: <span id="hashrate">0</span> H/s</div>
        <div>Total Hashes: <span id="total">0</span></div>
        <div>Shares: <span id="shares">0</span></div>
        <div>Running: <span id="running">No</span></div>
    </div>
    
    <div id="log"></div>

    <script>
        let Module = null;
        let updateInterval = null;
        
        function log(msg) {
            const div = document.getElementById('log');
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            div.appendChild(entry);
            div.scrollTop = div.scrollHeight;
        }
        
        function updateStats() {
            if (!Module) return;
            
            const hashrate = Module.ccall('wasmGetHashrate', 'number', [], []);
            const total = Module.ccall('wasmGetTotalHashes', 'number', [], []);
            const shares = Module.ccall('wasmGetSharesFound', 'number', [], []);
            const running = Module.ccall('wasmIsRunning', 'boolean', [], []);
            
            document.getElementById('hashrate').textContent = hashrate.toFixed(1);
            document.getElementById('total').textContent = total;
            document.getElementById('shares').textContent = shares;
            document.getElementById('running').textContent = running ? 'Yes' : 'No';
        }
        
        document.getElementById('startBtn').onclick = async () => {
            if (!Module) {
                log('Loading WASM module...');
                Module = await XMRigModule();
                log('Module loaded!');
            }
            
            const wallet = "47ucoYKmFAficWjA649pnZNcHWm3co87wipCLYLvTuvzhCcZahT1cSFhLaxZr8okVsZfCbjw236urEPbjbty2ZRWU5yeTxm";
            const pool = "wss://wrxproxy.qzz.io";
            const threads = 2;
            
            const result = Module.ccall('wasmStartMining', 'number', 
                ['string', 'string', 'number'], 
                [pool, wallet, threads]
            );
            
            if (result === 0) {
                log('Mining started!');
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                
                updateInterval = setInterval(updateStats, 1000);
            } else {
                log('Failed to start mining');
            }
        };
        
        document.getElementById('stopBtn').onclick = () => {
            if (Module) {
                Module.ccall('wasmStopMining', null, [], []);
                log('Mining stopped');
            }
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            clearInterval(updateInterval);
            updateStats();
        };
        
        log('Page loaded. Click Start to begin.');
    </script>
    <script src="xmrig-wasm.js"></script>
</body>
</html>
